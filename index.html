<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLUEDIA COFFEE Membership</title>
  <style>
    :root {
      --blue:#1f326d;
      --blue2:#405cb2;
      --gold:#c7a27a;
      --gold2:#f6efe7;
      --ink:#172447;
      --muted:#6d7892;
      --line:#e5eaf4;
      --bg1:#edf2fb;
      --bg2:#f9f5ef;
      --danger:#b54343;
      --ok:#1d7a4d;
      --shadow:0 24px 60px rgba(34,55,116,.12);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin:0; color:var(--ink); background:linear-gradient(180deg,var(--bg1),var(--bg2)); min-height:100vh; }
    button, input { font-family:inherit; }
    button { cursor:pointer; }
    .page { min-height:100vh; padding:24px; }
    .max { max-width:1180px; margin:0 auto; }
    .top { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; flex-wrap:wrap; margin-bottom:22px; }
    .eyebrow { font-size:12px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; color:#9d7c61; }
    h1 { margin:6px 0 8px; font-size:34px; line-height:1.08; letter-spacing:-1px; }
    h2 { margin:6px 0 14px; font-size:24px; }
    h3 { margin:0 0 12px; font-size:20px; }
    .sub { color:#63708d; font-size:15px; line-height:1.55; }
    .grid2 { display:grid; grid-template-columns:minmax(320px,.85fr) minmax(360px,1.15fr); gap:20px; align-items:start; }
    .card { background:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.95); border-radius:28px; padding:24px; box-shadow:var(--shadow); }
    .panel { background:#fff; border:1px solid var(--line); border-radius:22px; padding:18px; box-shadow:0 14px 30px rgba(43,59,111,.08); }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .input { width:100%; border:1px solid #dbe3f0; border-radius:16px; background:#fff; padding:14px 16px; font-size:16px; outline:none; }
    .input.big { font-size:18px; font-weight:800; padding:16px 18px; border-radius:18px; }
    .btn { border:1px solid #d7dfed; border-radius:16px; padding:12px 16px; background:#fff; color:var(--blue); font-weight:900; }
    .btn.primary { border:none; color:#fff; background:linear-gradient(135deg,var(--blue),var(--blue2)); box-shadow:0 14px 28px rgba(31,50,109,.25); }
    .btn.gold { background:#fff8f0; color:#7d5b3d; border-color:#ead9c8; }
    .btn.danger { color:#fff; border:none; background:linear-gradient(135deg,#a63838,#d35d5d); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .search-row { display:grid; grid-template-columns:1fr 110px; gap:12px; margin-top:18px; }
    .summary { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:16px; }
    .stat { background:#fff; border:1px solid var(--line); border-radius:22px; padding:16px; }
    .stat .label { font-size:13px; color:#7b859f; margin-bottom:8px; }
    .stat .value { font-size:22px; font-weight:950; color:#1a2549; }
    .wheel-wrap { position:relative; display:flex; justify-content:center; align-items:center; padding:20px 0 8px; }
    .pointer { position:absolute; top:0; left:50%; transform:translateX(-50%); width:0; height:0; border-left:18px solid transparent; border-right:18px solid transparent; border-top:34px solid #c14444; z-index:3; filter:drop-shadow(0 8px 12px rgba(0,0,0,.2)); }
    .wheel { width:330px; height:330px; border-radius:50%; border:10px solid #d8c0a8; background:conic-gradient(#1f326d 0deg 60deg,#c7a27a 60deg 120deg,#3d56a6 120deg 180deg,#e7d9ca 180deg 240deg,#8d6a4a 240deg 300deg,#5a74c7 300deg 360deg); transition:transform 3.6s cubic-bezier(.14,.8,.18,1); position:relative; box-shadow:0 20px 50px rgba(31,50,109,.18); }
    .wheel:after { content:'BLUEDIA\A ROULETTE'; white-space:pre; position:absolute; inset:50%; transform:translate(-50%,-50%); width:86px; height:86px; display:flex; align-items:center; justify-content:center; text-align:center; border-radius:50%; background:var(--blue); color:#fff; border:8px solid #fff; font-size:13px; font-weight:950; line-height:1.25; }
    .legend { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:12px; }
    .legend-item { font-size:12px; color:#45506f; display:flex; gap:8px; align-items:center; background:#fff; border:1px solid var(--line); border-radius:999px; padding:7px 10px; }
    .dot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
    .result { margin-top:16px; border-radius:22px; padding:18px; background:linear-gradient(135deg,#1b2750,#31478f); color:#fff; }
    .result .label { font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:#d7c1a8; font-weight:900; }
    .result .value { margin-top:10px; font-size:24px; font-weight:950; line-height:1.2; }
    .coupon-box { margin-top:18px; padding:22px; border-radius:24px; background:linear-gradient(135deg,#fff8f0,#fff); border:1px solid #ead9c8; }
    .warning { margin-top:12px; padding:10px 12px; border-radius:14px; background:#fff1f1; border:1px solid #ffd0d0; color:var(--danger); font-size:13px; font-weight:900; }
    .member-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
    .member-card { border-radius:22px; padding:18px; background:linear-gradient(180deg,#fff,#f7f9fd); border:1px solid var(--line); box-shadow:0 14px 28px rgba(43,59,111,.08); }
    .member-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .name { font-size:20px; font-weight:950; color:var(--ink); }
    .phone { margin-top:6px; color:#7b859f; font-size:13px; }
    .pills { display:grid; gap:8px; justify-items:end; }
    .pill { border-radius:999px; padding:8px 12px; font-size:13px; font-weight:950; white-space:nowrap; }
    .pill.blue { background:var(--blue); color:#fff; }
    .pill.gold { background:var(--gold2); color:#7d5b3d; border:1px solid #e7d7c7; }
    .actions { display:grid; grid-template-columns:1fr 1fr 1.3fr; gap:8px; margin-top:16px; }
    .section-title { font-size:13px; font-weight:950; color:#5f6c88; margin:14px 0 10px; padding-top:14px; border-top:1px solid var(--line); }
    .coupon-list { display:flex; flex-wrap:wrap; gap:8px; }
    .coupon-chip { border-radius:999px; border:1px solid #d7dfed; background:#fff; color:#23325f; padding:10px 12px; font-weight:850; display:inline-flex; gap:8px; align-items:center; }
    .coupon-chip.readonly { cursor:default; opacity:.92; }
    .use-badge { background:var(--blue); color:#fff; border-radius:999px; padding:4px 8px; font-size:11px; font-weight:950; }
    .history-list { display:grid; gap:8px; }
    .history-row { display:flex; justify-content:space-between; gap:12px; align-items:center; border-radius:12px; padding:10px 12px; background:#f8fafc; border:1px solid var(--line); }
    .history-title { font-size:13px; font-weight:850; color:#23325f; }
    .history-meta { margin-top:4px; font-size:11px; color:#7b859f; }
    .history-kind { font-size:12px; font-weight:950; color:#7d5b3d; background:var(--gold2); border:1px solid #e7d7c7; border-radius:999px; padding:6px 10px; white-space:nowrap; }
    .muted { color:#8a95ad; font-size:13px; }
    .login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--blue),var(--blue2)); padding:24px; }
    .login-card { width:100%; max-width:460px; padding:30px; background:#fff; border-radius:28px; box-shadow:0 30px 90px rgba(0,0,0,.25); }
    .logo { font-size:28px; font-weight:950; color:var(--blue); }
    .staff-tools { margin-top:22px; display:grid; grid-template-columns:1.1fr .9fr; gap:18px; align-items:start; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:16px 0; }
    .modal { position:fixed; inset:0; background:rgba(10,16,35,.52); backdrop-filter:blur(8px); z-index:50; display:flex; align-items:center; justify-content:center; padding:24px; }
    .modal-card { width:100%; max-width:980px; max-height:90vh; overflow:auto; border-radius:28px; background:#fff; box-shadow:0 30px 80px rgba(16,25,58,.32); padding:24px; }
    .modal-head { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; margin-bottom:18px; }
    .settings-row { display:grid; grid-template-columns:14px 1fr 100px 80px; gap:10px; align-items:center; padding:10px; border:1px solid var(--line); border-radius:16px; background:#f8fafc; margin-bottom:10px; }
    .audit-grid { display:grid; grid-template-columns:300px 1fr; gap:14px; }
    .audit-list { max-height:560px; overflow:auto; display:grid; gap:8px; }
    .small { font-size:12px; color:#697590; }
    @media (max-width: 860px) { .grid2,.customerGrid,.heroGrid,.staff-tools,.audit-grid{grid-template-columns:1fr!important;} .actions{grid-template-columns:1fr;} h1{font-size:28px;} .wheel{width:280px;height:280px;} .search-row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const STAFF_PASS = '1234';
    const OWNER_PASS = '9258';
    const BAG_SIZE = 180;
    const DAILY_CUSTOMER_SPIN_LIMIT = 3;
    const SUPABASE_URL = 'https://ovkhokqqcauyyrqwrcpw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_lxSUZss5XF24tDP05urG2g_WcZX0Lu7';
    const SUPABASE_READY = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
    const COLORS = ['#1f326d', '#c7a27a', '#3d56a6', '#e7d9ca', '#8d6a4a', '#5a74c7'];
    const DEFAULT_REWARDS = [
      { name: '아쉽지만 다음기회!', prob: 0.5, type: 'none' },
      { name: '스탬프 +2', prob: 0.2, type: 'stamp', value: 2 },
      { name: '스탬프 +3', prob: 0.1, type: 'stamp', value: 3 },
      { name: '1000원 할인쿠폰', prob: 0.08, type: 'coupon', couponType: 'discount', couponLabel: '1000원 할인쿠폰' },
      { name: '사이즈업 쿠폰', prob: 0.054, type: 'coupon', couponType: 'upgrade', couponLabel: '사이즈업 쿠폰' },
      { name: '무료음료 쿠폰', prob: 0.066, type: 'coupon', couponType: 'free', couponLabel: '무료음료 쿠폰' },
    ];
    const state = {
      mode: 'customer',
      staffLoggedIn: false,
      staffName: '직원',
      staffQuery: '',
      selectedCustomerId: null,
      customerPhone: '',
      customerResult: '내 룰렛 결과가 여기에 표시됩니다',
      staffResult: '룰렛을 시작해 주세요',
      customerSpinning: false,
      staffSpinning: false,
      customerAngle: 0,
      staffAngle: 0,
      settingsOpen: false,
      settingsUnlocked: false,
      auditOpen: false,
      auditUnlocked: false,
      ownerPassword: '',
      rewards: loadRewards(),
      rewardBag: [],
      bagCursor: 0,
      members: [],
      allHistories: [],
      allCoupons: [],
      dbMessage: '',
    };
    state.rewardBag = createShuffledBag(state.rewards);

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }
    function todayKey() { return new Date().toISOString().slice(0,10); }
    function makeTimeLabel(value) {
      const d = value ? new Date(value) : new Date();
      if (Number.isNaN(d.getTime())) return '';
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${y}-${m}-${day} ${hh}:${mm}`;
    }
    function phoneDigits(value) { return String(value || '').replace(/\D/g,''); }
    function formatPhone(value) {
      const n = phoneDigits(value).slice(0,11);
      if (n.length < 4) return n;
      if (n.length < 8) return `${n.slice(0,3)}-${n.slice(3)}`;
      return `${n.slice(0,3)}-${n.slice(3,7)}-${n.slice(7)}`;
    }
    function normalize(rewards) {
      const sum = rewards.reduce((a,b)=>a+Number(b.prob||0),0);
      return sum <= 0 ? rewards.map(r=>({...r, normalizedProb:0})) : rewards.map(r=>({...r, normalizedProb:Number(r.prob||0)/sum}));
    }
    function buildRewardBag(rewards, bagSize=BAG_SIZE) {
      const normalized = normalize(rewards);
      const ideal = normalized.map(r=>r.normalizedProb*bagSize);
      const counts = ideal.map(Math.floor);
      let allocated = counts.reduce((a,b)=>a+b,0);
      while (allocated < bagSize) {
        let best = 0, rem = -1;
        for (let i=0;i<ideal.length;i++) {
          const r = ideal[i]-counts[i];
          if (r > rem) { rem = r; best = i; }
        }
        counts[best] += 1;
        allocated += 1;
      }
      const bag = [];
      counts.forEach((count, idx)=>{ for(let i=0;i<count;i++) bag.push(idx); });
      return bag;
    }
    function createShuffledBag(rewards) {
      const bag = buildRewardBag(rewards);
      for (let i=bag.length-1;i>0;i--) {
        const j = Math.floor(Math.random()*(i+1));
        [bag[i],bag[j]] = [bag[j],bag[i]];
      }
      return bag;
    }
    function loadRewards() {
      try { return JSON.parse(localStorage.getItem('bluedia_rewards') || 'null') || DEFAULT_REWARDS; } catch { return DEFAULT_REWARDS; }
    }
    function saveRewards() {
      localStorage.setItem('bluedia_rewards', JSON.stringify(state.rewards));
      state.rewardBag = createShuffledBag(state.rewards);
      state.bagCursor = 0;
    }
    function formatPercent(v) { return `${(v*100).toFixed(1)}%`; }

    async function sb(path, options={}) {
      if (!SUPABASE_READY) return { data:null, error:'Supabase 연결값 없음' };
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
          ...options,
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation',
            ...(options.headers || {})
          }
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : null;
        if (!res.ok) { console.error('Supabase error', data); return { data:null, error:data }; }
        return { data, error:null };
      } catch (error) {
        console.error(error); return { data:null, error };
      }
    }

    function historyToApp(row) { return { id:row.id, member_id:row.member_id, kind:row.kind, title:row.title, time:makeTimeLabel(row.created_at), created_at:row.created_at }; }
    function couponToApp(row) { return { id:row.id, member_id:row.member_id, type:row.type, label:row.label, status:row.status, createdAt:row.created_at, usedAt:row.used_at }; }

    async function loadData() {
      state.dbMessage = 'DB 불러오는 중...';
      render();
      const [m,c,h,p] = await Promise.all([
        sb('members?select=*&order=created_at.asc'),
        sb('coupons?select=*&order=created_at.desc'),
        sb('histories?select=*&order=created_at.desc'),
        sb(`roulette_plays?select=*&play_date=eq.${todayKey()}`)
      ]);
      const dbMembers = m.data || [];
      const coupons = (c.data || []).map(couponToApp);
      const histories = (h.data || []).map(historyToApp);
      const plays = p.data || [];
      state.allCoupons = coupons;
      state.allHistories = histories;
      state.members = dbMembers.map(member => {
        const memberCouponsAll = coupons.filter(x => x.member_id === member.id);
        const active = memberCouponsAll.filter(x => x.status === 'active');
        const memberHistories = histories.filter(x => x.member_id === member.id);
        const playCount = plays.filter(x => x.member_id === member.id).length;
        return {
          id: member.id,
          name: member.name,
          phone: member.phone,
          stamps: member.stamps || 0,
          coupons: active,
          allCoupons: memberCouponsAll,
          history: memberHistories,
          roulettePlays: { [todayKey()]: playCount },
          created_at: member.created_at
        };
      });
      state.dbMessage = `DB 연결됨 · 회원 ${state.members.length}명`;
      render();
    }

    async function addMember(name, phone, stamps=0) {
      const cleanName = String(name||'').trim();
      const cleanPhone = formatPhone(phone);
      if (!cleanName || !cleanPhone) return alert('이름과 전화번호를 입력해주세요.');
      await sb('members', { method:'POST', body:JSON.stringify([{ name:cleanName, phone:cleanPhone, stamps:Number(stamps||0) }]) });
      await loadData();
    }

    async function saveHistory(memberId, kind, title) {
      await sb('histories', { method:'POST', body:JSON.stringify([{ member_id:memberId, kind, title }]) });
    }
    async function updateStamps(memberId, stamps) {
      await sb(`members?id=eq.${memberId}`, { method:'PATCH', body:JSON.stringify({ stamps }) });
    }
    async function addStamp(memberId, delta) {
      const member = state.members.find(m=>m.id===memberId);
      if (!member) return;
      const next = Math.max(0, member.stamps + delta);
      const title = `[직원:${state.staffName}] ${delta > 0 ? `스탬프 +${delta} 적립` : `스탬프 ${delta} 차감`} · 변경 후 ${next}개`;
      await updateStamps(memberId, next);
      await saveHistory(memberId, '스탬프', title);
      await loadData();
    }
    async function markCouponUsed(memberId, couponId) {
      const member = state.members.find(m=>m.id===memberId);
      const coupon = member?.coupons.find(c=>c.id===couponId);
      if (!member || !coupon) return;
      if (!confirm(`${member.name} 고객님의 '${coupon.label}'을 사용 처리할까요?`)) return;
      await sb(`coupons?id=eq.${couponId}`, { method:'PATCH', body:JSON.stringify({ status:'used', used_at:new Date().toISOString() }) });
      await saveHistory(memberId, '쿠폰사용', `[직원:${state.staffName}] ${coupon.label} 사용 처리`);
      await loadData();
    }
    async function createCoupon(memberId, reward) {
      await sb('coupons', { method:'POST', body:JSON.stringify([{ member_id:memberId, type:reward.couponType, label:reward.couponLabel || reward.name, status:'active' }]) });
    }
    async function createPlay(memberId, rewardName) {
      await sb('roulette_plays', { method:'POST', body:JSON.stringify([{ member_id:memberId, play_date:todayKey(), result:rewardName }]) });
    }
    function nextRewardIndex() {
      if (state.bagCursor >= state.rewardBag.length) {
        state.rewardBag = createShuffledBag(state.rewards);
        state.bagCursor = 0;
      }
      return state.rewardBag[state.bagCursor++] || 0;
    }
    async function applySpin(memberId, reward, source) {
      const member = state.members.find(m=>m.id===memberId);
      if (!member) return;
      let nextStamp = Math.max(0, member.stamps - 1);
      if (reward.type === 'stamp') nextStamp += Number(reward.value || 0);
      const sourceLabel = source === 'customer' ? '고객룰렛' : '직원룰렛';
      const staffPart = source === 'staff' ? `[직원:${state.staffName}] ` : '';
      const title = `${staffPart}룰렛 참여 · 결과: ${reward.name} · 스탬프 1개 사용`;
      await updateStamps(memberId, nextStamp);
      if (reward.type === 'coupon') await createCoupon(memberId, reward);
      await saveHistory(memberId, sourceLabel, title);
      await createPlay(memberId, reward.name);
      await loadData();
    }
    function spin(memberId, source) {
      const member = state.members.find(m=>m.id===memberId);
      if (!member) return;
      if (member.stamps < 1) return alert('스탬프가 부족합니다.');
      if (source === 'customer') {
        const played = member.roulettePlays?.[todayKey()] || 0;
        if (played >= DAILY_CUSTOMER_SPIN_LIMIT) return alert('오늘 참여 가능 횟수 3회를 모두 사용했습니다.');
      }
      if (source === 'customer') state.customerSpinning = true; else state.staffSpinning = true;
      const index = nextRewardIndex();
      const slice = 360 / state.rewards.length;
      const selectedMid = index * slice + slice/2;
      const current = source === 'customer' ? state.customerAngle : state.staffAngle;
      const finalAngle = 360 - selectedMid;
      const normalized = ((current % 360) + 360) % 360;
      const delta = ((finalAngle - normalized) + 360) % 360;
      const target = current + 360*6 + delta;
      if (source === 'customer') { state.customerAngle = target; state.customerResult = '룰렛 진행 중...'; }
      else { state.staffAngle = target; state.staffResult = '룰렛 진행 중...'; }
      render();
      setTimeout(async () => {
        const reward = state.rewards[index] || state.rewards[0];
        await applySpin(memberId, reward, source);
        if (source === 'customer') { state.customerSpinning = false; state.customerResult = `${member.name} 고객님 · ${reward.name}`; }
        else { state.staffSpinning = false; state.staffResult = `${member.name} 고객님 · ${reward.name}`; }
        render();
      }, 3700);
    }

    function couponList(member, readOnly=false) {
      if (!member.coupons.length) return '<div class="muted">보유 쿠폰이 없습니다</div>';
      return `<div class="coupon-list">${member.coupons.map(c => `
        <button class="coupon-chip ${readOnly?'readonly':''}" ${readOnly ? '' : `onclick="markCouponUsed('${member.id}','${c.id}')"`}>
          ${escapeHtml(c.label)} ${readOnly ? '' : '<span class="use-badge">사용</span>'}
        </button>`).join('')}</div>`;
    }
    function historyList(member, limit=6) {
      if (!member.history.length) return '<div class="muted">아직 기록이 없습니다</div>';
      return `<div class="history-list">${member.history.slice(0,limit).map(h => `
        <div class="history-row"><div><div class="history-title">${escapeHtml(h.title)}</div><div class="history-meta">${escapeHtml(h.time)}</div></div><div class="history-kind">${escapeHtml(h.kind)}</div></div>`).join('')}</div>`;
    }
    function wheelHtml(angle) {
      const normalized = normalize(state.rewards);
      return `<div class="wheel-wrap"><div class="pointer"></div><div class="wheel" style="transform:rotate(${angle}deg)"></div></div>
      <div class="legend">${state.rewards.map((r,i)=>`<div class="legend-item"><span class="dot" style="background:${COLORS[i%COLORS.length]}"></span>${escapeHtml(r.name)} · ${formatPercent(normalized[i]?.normalizedProb||0)}</div>`).join('')}</div>`;
    }

    function renderCustomer() {
      const m = state.selectedCustomerId ? state.members.find(x=>x.id===state.selectedCustomerId) : null;
      const played = m?.roulettePlays?.[todayKey()] || 0;
      const remaining = Math.max(0, DAILY_CUSTOMER_SPIN_LIMIT - played);
      const canSpin = Boolean(m && remaining > 0 && m.stamps > 0 && !state.customerSpinning);
      return `<div class="page"><div class="max">
        <div class="top"><div><div class="eyebrow">BLUEDIA COFFEE</div><h1>마이 쿠폰 & 룰렛 이벤트</h1><div class="sub">전화번호로 내 스탬프, 보유 쿠폰, 사용 이력을 확인하세요. 쿠폰 사용은 직원이 처리합니다.</div></div><button class="btn" onclick="state.mode='staffLogin';render()">직원용</button></div>
        <div class="grid2">
          <div class="card"><div class="eyebrow">my page login</div><h2>전화번호로 내 정보 확인</h2><div class="search-row"><input class="input big" id="custPhone" placeholder="010-0000-0000" value="${escapeHtml(state.customerPhone)}"><button class="btn primary" onclick="lookupCustomer()">조회</button></div><div class="small" style="margin-top:10px">${escapeHtml(state.dbMessage)}</div>
            ${m ? `<div class="panel" style="margin-top:18px"><div class="name">${escapeHtml(m.name)} 고객님</div><div class="summary"><div class="stat"><div class="label">스탬프</div><div class="value">${m.stamps}개</div></div><div class="stat"><div class="label">보유 쿠폰</div><div class="value">${m.coupons.length}개</div></div><div class="stat"><div class="label">오늘 참여</div><div class="value">${played}/3회</div></div><div class="stat"><div class="label">남은 참여</div><div class="value">${remaining}회</div></div></div></div>` : ''}
          </div>
          <div class="card">${wheelHtml(state.customerAngle)}<div class="result"><div class="label">이번 결과</div><div class="value">${escapeHtml(state.customerResult)}</div></div><div class="coupon-box"><h3>스탬프를 사용하여 룰렛 이벤트에 참가하시겠습니까?</h3><div class="sub">참여 시 스탬프 1개가 사용됩니다. 하루 최대 3번까지 참여 가능합니다.</div><button class="btn primary" style="width:100%;margin-top:14px" ${canSpin?'':'disabled'} onclick="spin('${m?.id||''}','customer')">${state.customerSpinning?'룰렛 진행 중...':'스탬프 1개 사용하고 룰렛 참여'}</button>${m&&m.stamps<=0?'<div class="warning">스탬프가 부족합니다.</div>':''}${m&&remaining<=0?'<div class="warning">오늘 참여 가능 횟수 3회를 모두 사용했습니다.</div>':''}</div></div>
        </div>
        ${m ? `<div class="card" style="margin-top:20px"><h2>내 쿠폰과 사용 이력</h2><div class="section-title">보유 쿠폰</div>${couponList(m,true)}<div class="section-title">최근 이력</div>${historyList(m,10)}</div>` : ''}
      </div></div>`;
    }
    function lookupCustomer() {
      state.customerPhone = formatPhone(document.getElementById('custPhone').value);
      const found = state.members.find(m=>m.phone === state.customerPhone);
      if (!found) { state.selectedCustomerId = null; state.customerResult = '등록된 회원을 찾을 수 없습니다.'; }
      else { state.selectedCustomerId = found.id; state.customerResult = `${found.name} 고객님 정보를 불러왔습니다.`; }
      render();
    }

    function renderStaffLogin() {
      return `<div class="login-page"><div class="login-card"><div class="logo">BLUEDIA COFFEE</div><div class="sub">직원 로그인</div><div class="panel" style="margin-top:20px"><div class="eyebrow">staff access</div><h2>직원 로그인</h2><input class="input" id="staffName" placeholder="직원 이름" value="${escapeHtml(state.staffName)}"><input class="input" id="staffPass" type="password" placeholder="비밀번호" style="margin-top:10px"><button class="btn primary" style="width:100%;margin-top:12px" onclick="staffLogin()">로그인</button><button class="btn" style="width:100%;margin-top:10px" onclick="state.mode='customer';render()">고객 페이지로 돌아가기</button></div></div></div>`;
    }
    function staffLogin() {
      const name = document.getElementById('staffName').value.trim() || '직원';
      const pass = document.getElementById('staffPass').value;
      if (pass !== STAFF_PASS) return alert('직원 비밀번호가 올바르지 않습니다.');
      state.staffName = name;
      state.staffLoggedIn = true;
      state.mode = 'staff';
      render();
    }
    function filteredMembers() {
      const q = state.staffQuery.trim().toLowerCase();
      if (!q) return state.members;
      const digits = phoneDigits(q);
      return state.members.filter(m => {
        const full = `${m.name} ${m.phone}`.toLowerCase();
        const pd = phoneDigits(m.phone);
        return full.includes(q) || (digits && (pd.includes(digits) || pd.slice(-4).includes(digits)));
      });
    }
    function renderStaff() {
      const members = filteredMembers();
      return `<div class="page"><div class="max">
        <div class="top"><div><div class="eyebrow">BLUEDIA COFFEE · 직원 ${escapeHtml(state.staffName)}</div><h1>직원용 쿠폰/스탬프 관리</h1><div class="sub">전화번호 뒷자리 4자리로 빠르게 고객을 찾고, 모든 처리 기록은 DB에 남습니다.</div></div><div class="row"><button class="btn gold" onclick="openSettings()">룰렛 설정</button><button class="btn gold" onclick="openAudit()">최고관리자 로그</button><button class="btn" onclick="state.mode='customer';render()">고객 페이지</button></div></div>
        <div class="staff-tools"><div class="card">${wheelHtml(state.staffAngle)}<div class="result"><div class="label">직원 룰렛 결과</div><div class="value">${escapeHtml(state.staffResult)}</div></div></div><div class="card"><div class="eyebrow">quick search</div><h2>회원 검색</h2><input class="input big" id="staffSearch" placeholder="이름 / 전화번호 / 뒷자리 4자리" value="${escapeHtml(state.staffQuery)}" oninput="state.staffQuery=this.value;render()"><div class="small" style="margin-top:10px">검색 결과 ${members.length}명 · ${escapeHtml(state.dbMessage)}</div><div class="section-title">신규 회원 등록</div><div class="row"><input class="input" id="newName" placeholder="이름" style="flex:1"><input class="input" id="newPhone" placeholder="010-0000-0000" style="flex:1"><button class="btn primary" onclick="addMemberFromForm()">등록</button></div></div></div>
        <div class="card" style="margin-top:20px"><div class="top"><div><div class="eyebrow">member list</div><h2>회원 목록</h2></div><div class="small">쿠폰 사용은 직원만 가능</div></div><div class="member-grid">${members.map(memberCard).join('')}</div></div>
      </div>${settingsModal()}${auditModal()}</div>`;
    }
    function addMemberFromForm() {
      addMember(document.getElementById('newName').value, document.getElementById('newPhone').value, 0);
    }
    window.addMemberFromForm = addMemberFromForm;
    function memberCard(m) {
      return `<div class="member-card"><div class="member-top"><div><div class="name">${escapeHtml(m.name)}</div><div class="phone">${escapeHtml(m.phone)}</div></div><div class="pills"><div class="pill blue">${m.stamps}개</div><div class="pill gold">쿠폰 ${m.coupons.length}개</div></div></div><div class="actions"><button class="btn" onclick="addStamp('${m.id}',1)">+1 적립</button><button class="btn" onclick="addStamp('${m.id}',-1)">-1 조정</button><button class="btn primary" onclick="spin('${m.id}','staff')">🎰 룰렛</button></div><div class="section-title">보유 쿠폰 · 직원 사용 처리</div>${couponList(m,false)}<div class="section-title">최근 이력</div>${historyList(m,5)}</div>`;
    }

    function openSettings(){ state.settingsOpen=true; state.settingsUnlocked=false; state.ownerPassword=''; render(); }
    function openAudit(){ state.auditOpen=true; state.auditUnlocked=false; state.ownerPassword=''; render(); }
    function closeModals(){ state.settingsOpen=false; state.auditOpen=false; state.settingsUnlocked=false; state.auditUnlocked=false; render(); }
    function unlockSettings(){ const v=document.getElementById('ownerPass')?.value || ''; if(v===OWNER_PASS){state.settingsUnlocked=true;render()} else alert('비밀번호가 올바르지 않습니다.'); }
    function unlockAudit(){ const v=document.getElementById('ownerPassAudit')?.value || ''; if(v===OWNER_PASS){state.auditUnlocked=true;render()} else alert('비밀번호가 올바르지 않습니다.'); }
    function settingsModal() {
      if (!state.settingsOpen) return '';
      const normalized = normalize(state.rewards);
      return `<div class="modal"><div class="modal-card"><div class="modal-head"><div><div class="eyebrow">owner only</div><h2>룰렛 이벤트 설정</h2></div><button class="btn" onclick="closeModals()">닫기</button></div>${!state.settingsUnlocked ? `<div class="panel"><h3>사장님 전용 비밀번호</h3><input class="input" id="ownerPass" type="password" placeholder="설정 비밀번호"><button class="btn primary" style="margin-top:12px" onclick="unlockSettings()">설정 열기</button></div>` : `<div class="panel"><div class="top"><div><div class="eyebrow">reward config</div><h2>룰렛 구성</h2></div><button class="btn primary" onclick="saveSettingsForm()">저장</button></div>${state.rewards.map((r,i)=>`<div class="settings-row"><span class="dot" style="background:${COLORS[i%COLORS.length]}"></span><input class="input" id="rewardName${i}" value="${escapeHtml(r.name)}"><input class="input" id="rewardProb${i}" type="number" step="0.001" value="${r.prob}"><div class="small">${formatPercent(normalized[i]?.normalizedProb||0)}</div></div>`).join('')}<div class="small">설정은 현재 브라우저에 저장됩니다. DB 저장형 설정은 추후 확장 가능합니다.</div></div>`}</div></div>`;
    }
    function saveSettingsForm() {
      state.rewards = state.rewards.map((r,i)=>({ ...r, name:document.getElementById(`rewardName${i}`).value, couponLabel:r.type==='coupon'?document.getElementById(`rewardName${i}`).value:r.couponLabel, prob:Number(document.getElementById(`rewardProb${i}`).value||0) }));
      saveRewards();
      alert('룰렛 설정을 저장했습니다.');
      closeModals();
    }
    function auditModal() {
      if (!state.auditOpen) return '';
      const staffLogs = state.allHistories.filter(h => h.title.includes('[직원:'));
      return `<div class="modal"><div class="modal-card"><div class="modal-head"><div><div class="eyebrow">super admin</div><h2>최고관리자 로그</h2></div><button class="btn" onclick="closeModals()">닫기</button></div>${!state.auditUnlocked ? `<div class="panel"><h3>최고관리자 비밀번호</h3><input class="input" id="ownerPassAudit" type="password" placeholder="관리자 비밀번호"><button class="btn primary" style="margin-top:12px" onclick="unlockAudit()">로그 열기</button></div>` : `<div class="summary"><div class="stat"><div class="label">회원</div><div class="value">${state.members.length}명</div></div><div class="stat"><div class="label">활성 쿠폰</div><div class="value">${state.allCoupons.filter(c=>c.status==='active').length}개</div></div><div class="stat"><div class="label">사용 쿠폰</div><div class="value">${state.allCoupons.filter(c=>c.status==='used').length}개</div></div><div class="stat"><div class="label">직원 처리 로그</div><div class="value">${staffLogs.length}건</div></div></div><div class="audit-grid" style="margin-top:18px"><div class="panel"><h3>회원별 요약</h3><div class="audit-list">${state.members.map(m=>`<div class="history-row"><div><div class="history-title">${escapeHtml(m.name)} · ${escapeHtml(m.phone)}</div><div class="history-meta">스탬프 ${m.stamps}개 / 활성쿠폰 ${m.coupons.length}개 / 전체기록 ${m.history.length}건</div></div></div>`).join('')}</div></div><div class="panel"><h3>전체 최근 로그</h3><div class="audit-list">${state.allHistories.slice(0,120).map(h=>`<div class="history-row"><div><div class="history-title">${escapeHtml(h.title)}</div><div class="history-meta">${escapeHtml(h.time)} · ${escapeHtml(state.members.find(m=>m.id===h.member_id)?.name || '알 수 없음')}</div></div><div class="history-kind">${escapeHtml(h.kind)}</div></div>`).join('')}</div></div></div>`}</div></div>`;
    }

    function render() {
      const app = document.getElementById('app');
      if (state.mode === 'customer') app.innerHTML = renderCustomer();
      else if (state.mode === 'staffLogin' || !state.staffLoggedIn) app.innerHTML = renderStaffLogin();
      else app.innerHTML = renderStaff();
    }
    window.state = state;
    window.render = render;
    window.lookupCustomer = lookupCustomer;
    window.staffLogin = staffLogin;
    window.addStamp = addStamp;
    window.markCouponUsed = markCouponUsed;
    window.spin = spin;
    window.openSettings = openSettings;
    window.openAudit = openAudit;
    window.closeModals = closeModals;
    window.unlockSettings = unlockSettings;
    window.unlockAudit = unlockAudit;
    window.saveSettingsForm = saveSettingsForm;
    window.addMemberFromForm = addMemberFromForm;

    render();
    loadData();
  </script>
</body>
</html>
