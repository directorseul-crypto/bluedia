<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLUEDIA COFFEE Coupon & Roulette</title>
  <style>
    :root{
      --blue:#1f326d; --blue2:#405cb2; --gold:#9d7c61; --gold2:#c7a27a;
      --cream:#f9f5ef; --soft:#edf2fb; --line:#dbe3f0; --text:#172447;
      --muted:#63708d; --danger:#b54343; --green:#1d7a4d;
      --shadow:0 24px 60px rgba(34,55,116,.12); --radius:28px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;color:var(--text);background:linear-gradient(180deg,var(--soft),var(--cream));min-height:100vh}
    button,input{font-family:inherit} button{cursor:pointer} button:disabled{cursor:not-allowed;filter:grayscale(.2);opacity:.6}
    .page{min-height:100vh;padding:24px}.shell{max-width:1220px;margin:0 auto}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:22px}
    .eyebrow{font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
    .brand{font-size:clamp(38px,5.5vw,72px);line-height:.98;font-weight:1000;letter-spacing:-2px;color:var(--blue);margin:8px 0}
    .sub{font-size:18px;color:var(--muted);line-height:1.5}
    .pill{border:1px solid var(--line);border-radius:999px;background:#fff;padding:13px 20px;font-weight:900;color:var(--gold);box-shadow:0 10px 24px rgba(49,67,120,.08)}
    .grid3{display:grid;grid-template-columns:1.05fr .9fr .75fr;gap:22px;align-items:start}
    .card{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.95);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
    .title{font-size:30px;line-height:1.16;font-weight:1000;margin:8px 0 14px;letter-spacing:-1px}
    .inputRow{display:grid;grid-template-columns:1fr 110px;gap:12px;align-items:stretch}
    input[type=text],input[type=password],input[type=number]{
      border:1px solid var(--line);border-radius:18px;padding:16px 18px;background:#fff;font-size:20px;font-weight:800;color:var(--text);outline:none;width:100%
    }
    .checkRow{display:flex;align-items:flex-start;gap:10px;margin:12px 0;color:#5f6c88;font-weight:700;line-height:1.45}
    .checkRow input{margin-top:5px;transform:scale(1.2)}
    .btn{border:none;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-weight:1000;font-size:17px;padding:14px 18px;box-shadow:0 14px 28px rgba(31,50,109,.24)}
    .btnLight{border:1px solid var(--line);background:#fff;color:var(--blue);box-shadow:none}.btnGold{background:linear-gradient(135deg,#875f3d,#b28a66)}
    .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}
    .stat{background:#fff;border:1px solid #ebeff6;border-radius:22px;padding:16px;box-shadow:0 12px 25px rgba(49,67,120,.06)}
    .stat .label{font-size:13px;color:#7b859f;font-weight:700;margin-bottom:6px}.stat .value{font-size:24px;font-weight:1000;color:#1a2549}
    .walletTitle{font-size:30px;font-weight:1000;margin:0 0 18px}.couponList{display:grid;gap:12px}
    .coupon{display:flex;justify-content:space-between;gap:12px;align-items:center;border:2px dashed #ead9c8;background:linear-gradient(135deg,#fff8f0,#fff);border-radius:22px;padding:16px 18px;flex-wrap:wrap}
    .coupon .name{font-size:22px;font-weight:1000;color:var(--blue)}.coupon .meta{font-size:13px;color:#7b859f;margin-top:4px}
    .badge{border-radius:999px;background:var(--blue);color:#fff;font-weight:900;padding:8px 13px;white-space:nowrap}.badgeGold{background:#f6efe7;color:#7d5b3d;border:1px solid #ead9c8}.badgeGreen{background:#e9f8f0;color:var(--green);border:1px solid #ccebd8}
    .danger{color:var(--danger);font-weight:900}.success{color:var(--green);font-weight:900}.muted{color:var(--muted)}
    .rouletteCard{padding:30px 24px;text-align:center}.wheelWrap{position:relative;width:min(430px,100%);aspect-ratio:1;margin:0 auto 22px;display:flex;align-items:center;justify-content:center}
    .pointer{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;border-top:38px solid #c14444;filter:drop-shadow(0 8px 10px rgba(0,0,0,.22))}
    .wheel{width:100%;height:100%;transition:transform 3.8s cubic-bezier(.12,.78,.16,1);filter:drop-shadow(0 20px 28px rgba(31,50,109,.18));will-change:transform}
    .result{text-align:left;border-radius:24px;padding:18px 22px;background:linear-gradient(135deg,#1b2750,#31478f);color:#fff;margin:16px auto 14px;max-width:430px}.result .small{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:#d7c1a8;font-weight:900;margin-bottom:8px}.result .big{font-size:24px;font-weight:1000;line-height:1.25}
    .menuBox{border:1px solid #ead9c8;background:#fff8f0;border-radius:24px;padding:18px;margin-top:16px;min-height:360px;display:flex;align-items:center;justify-content:center;overflow:hidden}.menuBox img{max-width:100%;max-height:520px;border-radius:18px;display:block}
    .historyHeader{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.historyItem{display:flex;justify-content:space-between;gap:14px;align-items:center;border:1px solid #ebeff6;background:#f8fafc;border-radius:16px;padding:13px 15px;margin-bottom:8px}
    .historyTitle{font-weight:900;color:#23325f}.historyTime{font-size:12px;color:#7b859f;margin-top:4px}.tabBar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .staffGrid{display:grid;grid-template-columns:360px 1fr 420px;gap:22px}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}.key{height:70px;border:1px solid var(--line);border-radius:18px;background:#fff;color:#172447;font-size:28px;font-weight:1000}.searchBox{text-align:center;background:#f7f9fd;border:1px solid var(--line);border-radius:18px;padding:14px;font-size:34px;font-weight:1000;color:var(--blue);min-height:70px}
    .memberActions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}.actionBtn{border-radius:16px;border:1px solid var(--line);background:#fff;color:#23325f;font-weight:1000;padding:14px 10px}.actionBtn.primary{background:var(--blue);color:#fff;border:none}.actionBtn.gold{background:#875f3d;color:#fff;border:none}
    .staffCoupon{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid #ead9c8;background:#fff8f0;border-radius:18px;padding:13px 16px;margin-bottom:10px;font-weight:900;flex-wrap:wrap}.staffCoupon button{border:none;background:var(--blue);color:#fff;border-radius:999px;padding:8px 12px;font-weight:900}
    .adminLog{max-height:460px;overflow:auto;padding-right:4px}.adminNote{border-radius:22px;background:#fff8f0;border:1px solid #ead9c8;padding:16px;margin-top:16px}.adminNote li{margin:8px 0;color:#5f6c88}.login{max-width:480px;margin:12vh auto}
    @media (max-width:1100px){.grid3,.staffGrid{grid-template-columns:1fr}.brand{font-size:44px}.summary{grid-template-columns:1fr 1fr}}@media (max-width:640px){.page{padding:16px}.inputRow{grid-template-columns:1fr}.summary{grid-template-columns:1fr}.memberActions{grid-template-columns:1fr}.brand{font-size:38px}.title{font-size:26px}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const SUPABASE_URL='https://ovkhokqqcauyyrqwrcpw.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_lxSUZss5XF24tDP05urG2g_WcZX0Lu7';
const STAFF_PASS='1234'; const OWNER_PASS='9258'; const DAILY_LIMIT=3;
const DEFAULT_REWARDS=[
 {name:'아쉽지만 다음기회!',prob:.5,type:'none'},
 {name:'스탬프 +2',prob:.2,type:'stamp',value:2},
 {name:'스탬프 +3',prob:.1,type:'stamp',value:3},
 {name:'1000원 할인쿠폰',prob:.08,type:'coupon',couponType:'discount',couponLabel:'1000원 할인쿠폰',pointValue:200},
 {name:'사이즈업 쿠폰',prob:.054,type:'coupon',couponType:'upgrade',couponLabel:'사이즈업 쿠폰',pointValue:200},
 {name:'무료음료 쿠폰',prob:.066,type:'coupon',couponType:'free',couponLabel:'무료음료 쿠폰',pointValue:200}
];
const COLORS=['#1f326d','#c7a27a','#3d56a6','#e7d9ca','#8d6a4a','#5a74c7'];
let state={mode:'customer',staffLogged:false,adminUnlocked:false,customerPhone:'',selectedMemberId:null,members:[],coupons:[],histories:[],plays:[],rewards:JSON.parse(localStorage.getItem('bluedia_rewards')||'null')||DEFAULT_REWARDS,menuImage:localStorage.getItem('bluedia_menu_image')||'',wheelAngle:0,spinning:false,result:'룰렛 결과가 여기에 표시됩니다',keypad:'',staffName:localStorage.getItem('bluedia_staff_name')||'직원A',customerHistoryOpen:false,staffHistoryOpen:false,message:'',signupName:'',signupPhone:'',privacyAgreed:false,marketingAgreed:false,showSignup:false};

function today(){return new Date().toISOString().slice(0,10)}
function nowLabel(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`}
function phone(v){const n=String(v||'').replace(/\D/g,'').slice(0,11);if(n.length<4)return n;if(n.length<8)return n.slice(0,3)+'-'+n.slice(3);return n.slice(0,3)+'-'+n.slice(3,7)+'-'+n.slice(7)}
function normalize(rs){const s=rs.reduce((a,b)=>a+Number(b.prob||0),0)||1;return rs.map(r=>({...r,normalizedProb:Number(r.prob||0)/s}))}
async function api(path,opt={}){const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opt,headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json',Prefer:'return=representation',...(opt.headers||{})}});const text=await res.text();const data=text?JSON.parse(text):null;if(!res.ok){console.error('Supabase',data);throw data}return data}
async function load(){try{const [members,coupons,histories,plays]=await Promise.all([api('members?select=*&order=created_at.asc'),api('coupons?select=*&status=eq.active&order=created_at.desc'),api('histories?select=*&order=created_at.desc'),api(`roulette_plays?select=*&play_date=eq.${today()}`)]);state.members=members||[];state.coupons=coupons||[];state.histories=histories||[];state.plays=plays||[]}catch(e){state.message='DB 불러오기 실패: Supabase 테이블/RLS를 확인하세요.'}render()}
function memberCoupons(id){return state.coupons.filter(c=>c.member_id===id)}
function memberHistory(id){return state.histories.filter(h=>h.member_id===id).map(h=>({id:h.id,kind:h.kind,title:h.title,time:h.created_at?h.created_at.slice(0,16).replace('T',' '):nowLabel()}))}
function playsToday(id){return state.plays.filter(p=>p.member_id===id).length}
function selectedMember(){return state.members.find(m=>m.id===state.selectedMemberId)||null}
function customerMember(){return state.members.find(m=>m.phone===state.customerPhone)||null}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function rewardBag(){const norm=normalize(state.rewards);const bag=[];norm.forEach((r,i)=>{const c=Math.max(1,Math.round(r.normalizedProb*180));for(let k=0;k<c;k++)bag.push(i)});return bag[Math.floor(Math.random()*bag.length)]||0}
function polar(cx,cy,r,a){const rad=(a-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}}
function segmentPath(cx,cy,r,start,end){const a=polar(cx,cy,r,start),b=polar(cx,cy,r,end);return`M ${cx} ${cy} L ${a.x} ${a.y} A ${r} ${r} 0 ${end-start<=180?0:1} 1 ${b.x} ${b.y} Z`}
function splitLabel(label){let t=String(label||'');if(t.length<=7)return [t];if(t.includes('쿠폰'))return [t.replace('쿠폰',''),'쿠폰'];if(t.includes('+'))return [t];return [t.slice(0,6),t.slice(6,12)]}
function wheelSvg(size=420){const cx=size/2,cy=size/2,r=size*.42,slice=360/state.rewards.length;let paths='',texts='';state.rewards.forEach((rw,i)=>{const start=i*slice,end=(i+1)*slice,mid=start+slice/2,p=polar(cx,cy,r*.58,mid);let rot=mid;if(mid>90&&mid<270)rot=mid+180;const light=[1,3,4].includes(i%COLORS.length),fill=light?'#172447':'#fff',lines=splitLabel(rw.name);paths+=`<path d="${segmentPath(cx,cy,r,start,end)}" fill="${COLORS[i%COLORS.length]}" stroke="#fff" stroke-width="3"/>`;texts+=`<g transform="translate(${p.x} ${p.y}) rotate(${rot})"><text text-anchor="middle" dominant-baseline="middle" font-size="${size<360?13:16}" font-weight="900" fill="${fill}">${lines.map((line,idx)=>`<tspan x="0" dy="${idx===0?(lines.length>1?-8:0):18}">${esc(line)}</tspan>`).join('')}</text></g>`});return `<div class="wheelWrap"><div class="pointer"></div><svg id="customerWheel" class="wheel" style="transform:rotate(${state.wheelAngle}deg)" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r+14}" fill="#f7efe7"/><circle cx="${cx}" cy="${cy}" r="${r+7}" fill="#d5b89a"/>${paths}${texts}<circle cx="${cx}" cy="${cy}" r="${size<360?42:54}" fill="#fff" stroke="#d8c0a8" stroke-width="8"/><circle cx="${cx}" cy="${cy}" r="${size<360?31:40}" fill="#1f326d"/><text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#fff" font-size="${size<360?14:18}" font-weight="900">BLUEDIA</text><text x="${cx}" y="${cy+16}" text-anchor="middle" fill="#d9c2ab" font-size="10" font-weight="900">ROULETTE</text></svg></div>`}
function couponWallet(m,readOnly=false){const cs=memberCoupons(m.id);return `<div class="card"><h2 class="walletTitle">내 쿠폰 지갑</h2>${cs.length?`<div class="couponList">${cs.map(c=>`<div class="coupon"><div><div class="name">${esc(c.label)}</div><div class="meta">발급 ${c.created_at?c.created_at.slice(0,16).replace('T',' '):''} · 전환 ${c.point_value||200}P</div></div>${readOnly?'<span class="badge">보유중</span>':`<button class="badge" onclick="useCoupon('${m.id}','${c.id}')">직원 사용</button><button class="badge badgeGold" onclick="convertCoupon('${m.id}','${c.id}')">200P 전환</button>`}</div>`).join('')}</div>`:`<p class="muted">보유 쿠폰이 없습니다.</p>`}${readOnly?'<p class="danger">고객은 확인만 가능 · 사용은 직원 처리</p>':''}</div>`}
function historyBlock(m,isCustomer=false){const hs=memberHistory(m.id),open=isCustomer?state.customerHistoryOpen:state.staffHistoryOpen,shown=open?hs:hs.slice(0,5);return `<div class="card"><div class="historyHeader"><h2 class="walletTitle">사용내역</h2>${hs.length>5?`<button class="btn btnLight" onclick="${isCustomer?'toggleCustomerHistory':'toggleStaffHistory'}()">${open?'접기':'전체 '+hs.length+'건 보기'}</button>`:''}</div>${shown.length?shown.map(h=>`<div class="historyItem"><div><div class="historyTitle">${esc(h.title)}</div><div class="historyTime">${esc(h.time)}</div></div><span class="badge badgeGold">${esc(h.kind)}</span></div>`).join(''):'<p class="muted">아직 사용 이력이 없습니다.</p>'}</div>`}
function signupCard(){return `<div class="card"><div class="eyebrow">NEW MEMBER</div><h2 class="title">처음 방문이신가요?</h2><p class="muted">회원가입하면 첫 가입 웰컴 쿠폰을 드립니다.</p><input type="text" placeholder="이름" value="${esc(state.signupName)}" oninput="state.signupName=this.value"><div style="height:10px"></div><input type="text" placeholder="010-0000-0000" value="${esc(state.signupPhone)}" oninput="state.signupPhone=phone(this.value);this.value=state.signupPhone"><label class="checkRow"><input type="checkbox" ${state.privacyAgreed?'checked':''} onchange="state.privacyAgreed=this.checked"><span><b>[필수]</b> 쿠폰 적립 및 사용내역 관리를 위한 개인정보 수집·이용에 동의합니다. 수집항목: 이름, 휴대폰번호, 쿠폰/스탬프/룰렛 이용기록</span></label><label class="checkRow"><input type="checkbox" ${state.marketingAgreed?'checked':''} onchange="state.marketingAgreed=this.checked"><span><b>[선택]</b> 이벤트와 혜택 안내 수신에 동의합니다.</span></label><button class="btn" onclick="signup()">회원가입하고 웰컴 쿠폰 받기</button></div>`}
function customerPage(){const m=customerMember(),remain=m?Math.max(0,DAILY_LIMIT-playsToday(m.id)):0,can=m&&remain>0&&m.stamps>0&&!state.spinning;return `<div class="page"><div class="shell"><div class="top"><div><div class="eyebrow">BLUEDIA COFFEE</div><div class="brand">BLUEDIA COFFEE</div><div class="sub">내 쿠폰 · 룰렛 이벤트 · 메뉴판 확인</div></div><button class="pill" onclick="goStaff()">직원용</button></div><div class="grid3"><div><div class="card"><div class="eyebrow">MY PAGE LOGIN</div><h1 class="title">전화번호로 내 쿠폰 확인</h1><div class="inputRow"><input type="text" id="phoneInput" placeholder="010-0000-0000" value="${esc(state.customerPhone)}" oninput="state.customerPhone=phone(this.value);this.value=state.customerPhone"><button class="btn" onclick="lookup()">조회</button></div>${m?`<div class="summary"><div class="stat"><div class="label">스탬프</div><div class="value">${m.stamps||0}개</div></div><div class="stat"><div class="label">포인트</div><div class="value">${m.point_balance||0}P</div></div><div class="stat"><div class="label">오늘 참여</div><div class="value">${playsToday(m.id)}/3회</div></div><div class="stat"><div class="label">남은 참여</div><div class="value">${remain}회</div></div></div>`:`<p class="muted">전화번호를 입력하고 조회하세요.</p>`}</div>${m?couponWallet(m,true):signupCard()}</div><div class="card rouletteCard">${wheelSvg(420)}<div class="result"><div class="small">이번 결과</div><div class="big">${esc(state.result)}</div></div><button class="btn" ${can?'':'disabled'} onclick="spinCustomer()">${state.spinning?'룰렛 진행 중...':'스탬프 1개 사용하고 룰렛 참여'}</button>${m&&m.stamps<=0?'<p class="danger">스탬프가 부족합니다.</p>':''}${m&&remain<=0?'<p class="danger">오늘 참여 가능 횟수를 모두 사용했습니다. 재구매 시 직원이 리셋할 수 있습니다.</p>':''}</div><div><div class="card"><div class="eyebrow">MENU & PRICE</div><h2 class="title">블루다이아커피 메뉴판</h2><div class="menuBox">${state.menuImage?`<img src="${state.menuImage}">`:'<div><h2>메뉴판 이미지</h2><p class="muted">최고관리자에서 메뉴판을 올리면 고객이 가격을 확인합니다.</p></div>'}</div></div></div></div>${m?historyBlock(m,true):''}</div></div>`}
function staffLogin(){return `<div class="page"><div class="login card"><div class="eyebrow">BLUEDIA COFFEE</div><h1 class="title">직원 로그인</h1><input type="password" id="staffPass" placeholder="직원 비밀번호"><button class="btn" onclick="staffLogin()">로그인</button><button class="btn btnLight" onclick="state.mode='customer';render()">고객 페이지로</button></div></div>`}
function staffPage(){const term=state.keypad,found=term?state.members.find(m=>String(m.phone||'').replace(/\D/g,'').slice(-4)===term):selectedMember();if(found)state.selectedMemberId=found.id;const m=selectedMember();return `<div class="page"><div class="shell"><div class="top"><div><div class="eyebrow">BLUEDIA COFFEE STAFF</div><div class="brand">STAFF</div><div class="sub">직원 처리 전용 · 빠른 검색 · 쿠폰 사용 · 기록 저장</div></div><div class="tabBar"><button class="pill" onclick="state.mode='admin';render()">최고관리자</button><button class="pill" onclick="state.mode='customer';render()">고객 페이지</button></div></div><div class="staffGrid"><div class="card"><h2 class="title">전화번호 뒷자리 검색</h2><div class="searchBox">${state.keypad||'----'}</div><div class="keypad">${['1','2','3','4','5','6','7','8','9','←','0','검색'].map(k=>`<button class="key" onclick="keypad('${k}')">${k}</button>`).join('')}</div><p class="muted">고객에게 “휴대폰 뒷자리 알려주세요”라고 안내하세요.</p></div><div>${m?`<div class="card"><h2 class="title">${esc(m.name)}</h2><p class="muted">${esc(m.phone)}</p><div class="summary"><div class="stat"><div class="label">스탬프</div><div class="value">${m.stamps||0}</div></div><div class="stat"><div class="label">포인트</div><div class="value">${m.point_balance||0}P</div></div></div><div class="memberActions"><button class="actionBtn primary" onclick="addStamp('${m.id}',1)">+1 적립</button><button class="actionBtn" onclick="addStamp('${m.id}',-1)">-1 조정</button><button class="actionBtn gold" onclick="repurchaseReset('${m.id}')">재구매 리셋</button></div><button class="btn ${Number(m.point_balance||0)>=1000?'':'btnLight'}" onclick="usePoints('${m.id}')" ${Number(m.point_balance||0)>=1000?'':'disabled'}>1,000P 사용 처리</button></div>${couponWallet(m,false)}${historyBlock(m,false)}`:'<div class="card"><h2 class="title">회원을 검색하세요</h2><p class="muted">뒷자리 4자리를 입력하면 빠르게 찾을 수 있습니다.</p></div>'}</div><div class="card"><h2 class="title">최근 운영 로그</h2><div class="adminLog">${state.histories.slice(0,10).map(h=>`<div class="historyItem"><div><div class="historyTitle">${esc(h.title)}</div><div class="historyTime">${h.created_at?h.created_at.slice(0,16).replace('T',' '):''}</div></div><span class="badge badgeGold">${esc(h.kind)}</span></div>`).join('')}</div></div></div></div></div>`}
function adminPage(){return `<div class="page"><div class="shell"><div class="top"><div><div class="eyebrow">BLUEDIA COFFEE ADMIN</div><div class="brand">ADMIN</div><div class="sub">룰렛 혜택 · 메뉴판 · 전체 로그 관리</div></div><div class="tabBar"><button class="pill" onclick="state.mode='staff';render()">직원용</button><button class="pill" onclick="state.mode='customer';render()">고객 페이지</button></div></div>${!state.adminUnlocked?`<div class="login card"><h2 class="title">최고관리자 비밀번호</h2><input type="password" id="ownerPass" placeholder="관리자 비밀번호"><button class="btn" onclick="adminLogin()">열기</button></div>`:`<div class="grid3"><div class="card"><h2 class="title">룰렛 혜택 설정</h2>${state.rewards.map((r,i)=>`<div class="historyItem"><input type="text" value="${esc(r.name)}" onchange="editRewardName(${i},this.value)"><input type="number" step="0.001" value="${r.prob}" onchange="editRewardProb(${i},this.value)"></div>`).join('')}<p class="muted">변경 후 새로 발급되는 쿠폰부터 새 이름으로 지급됩니다. 기존 쿠폰은 유지됩니다.</p></div><div class="card"><h2 class="title">메뉴판 이미지 업로드</h2><input type="file" accept="image/*" onchange="uploadMenu(event)"><div class="menuBox">${state.menuImage?`<img src="${state.menuImage}">`:'메뉴판 이미지 없음'}</div></div><div class="card"><h2 class="title">단골화 이벤트 10가지</h2><div class="adminNote"><ol><li>첫 가입 웰컴 쿠폰</li><li>5회 방문 사이즈업</li><li>10회 방문 무료음료</li><li>비 오는 날 2배 적립</li><li>출근시간대 룰렛 참여</li><li>점심 이후 재방문 리셋</li><li>친구 추천 쿠폰</li><li>생일 쿠폰</li><li>신메뉴 투표 쿠폰</li><li>월간 VIP 쿠폰</li></ol></div></div></div><div class="card" style="margin-top:22px"><h2 class="title">전체 로그</h2>${state.histories.map(h=>`<div class="historyItem"><div><div class="historyTitle">${esc(h.title)}</div><div class="historyTime">${h.created_at?h.created_at.slice(0,16).replace('T',' '):''}</div></div><span class="badge badgeGold">${esc(h.kind)}</span></div>`).join('')}</div>`}</div></div>`}
function render(){document.getElementById('app').innerHTML=state.mode==='customer'?customerPage():state.mode==='staff'&&!state.staffLogged?staffLogin():state.mode==='staff'?staffPage():adminPage()}
function lookup(){const input=document.getElementById('phoneInput');if(input)state.customerPhone=phone(input.value);const m=customerMember();state.result=m?`${m.name} 고객님 정보를 불러왔습니다.`:'등록된 회원을 찾을 수 없습니다. 아래에서 신규 가입할 수 있습니다.';state.signupPhone=state.customerPhone;render()}
function goStaff(){state.mode='staff';render()} function staffLogin(){const p=document.getElementById('staffPass')?.value;if(p===STAFF_PASS){state.staffLogged=true;state.mode='staff'}else alert('비밀번호가 올바르지 않습니다.');render()} function adminLogin(){const p=document.getElementById('ownerPass')?.value;if(p===OWNER_PASS){state.adminUnlocked=true}else alert('비밀번호가 올바르지 않습니다.');render()}
function keypad(k){if(k==='←')state.keypad=state.keypad.slice(0,-1);else if(k==='검색'){}else if(state.keypad.length<4)state.keypad+=k;render()}
async function addHistoryDb(id,kind,title){if(!id)return;await api('histories',{method:'POST',body:JSON.stringify([{member_id:id,kind,title}])})}
async function updateStamps(id,stamps){await api(`members?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({stamps})})}
async function updatePoints(id,points){await api(`members?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({point_balance:points})})}
async function signup(){const name=String(state.signupName||'').trim();const ph=phone(state.signupPhone);if(!name){alert('이름을 입력해주세요.');return}if(ph.length<13){alert('휴대폰 번호를 정확히 입력해주세요.');return}if(!state.privacyAgreed){alert('개인정보 수집·이용 필수 동의가 필요합니다.');return}const exists=state.members.find(m=>m.phone===ph);if(exists){state.customerPhone=ph;state.selectedMemberId=exists.id;state.result='이미 가입된 번호입니다. 기존 정보를 불러왔습니다.';render();return}try{let created;try{created=await api('members',{method:'POST',body:JSON.stringify([{name,phone:ph,stamps:0,privacy_agreed:true,marketing_agreed:!!state.marketingAgreed,signup_coupon_given:true,signup_source:'customer_signup'}])})}catch(e){created=await api('members',{method:'POST',body:JSON.stringify([{name,phone:ph,stamps:0}])})}const m=created?.[0];if(!m)throw new Error('회원 생성 실패');await api('coupons',{method:'POST',body:JSON.stringify([{member_id:m.id,type:'welcome',label:'첫 가입 웰컴 쿠폰',status:'active',point_value:200}])}).catch(()=>api('coupons',{method:'POST',body:JSON.stringify([{member_id:m.id,type:'welcome',label:'첫 가입 웰컴 쿠폰',status:'active'}])}));await addHistoryDb(m.id,'회원가입','고객 직접 회원가입 완료');await addHistoryDb(m.id,'개인정보동의',`개인정보 필수 동의 · 마케팅 ${state.marketingAgreed?'동의':'미동의'}`);await addHistoryDb(m.id,'웰컴쿠폰','첫 가입 웰컴 쿠폰 지급');state.customerPhone=ph;state.signupName='';state.signupPhone='';state.privacyAgreed=false;state.marketingAgreed=false;state.result='회원가입 완료! 첫 가입 웰컴 쿠폰이 지급되었습니다.';await load()}catch(e){alert('가입 중 오류가 발생했습니다. Supabase SQL/RLS를 확인해주세요.')}} 
async function addStamp(id,delta){const m=state.members.find(x=>x.id===id);if(!m)return;const n=Math.max(0,Number(m.stamps||0)+delta);const title=delta>0?`[직원:${state.staffName}] 스탬프 +${delta} 적립`:`[직원:${state.staffName}] 스탬프 ${delta} 조정`;await updateStamps(id,n);await addHistoryDb(id,'스탬프',title);await load()}
async function useCoupon(id,cid){const c=memberCoupons(id).find(x=>x.id===cid);if(!c)return;await api(`coupons?id=eq.${cid}`,{method:'PATCH',body:JSON.stringify({status:'used',used_at:new Date().toISOString()})});await addHistoryDb(id,'쿠폰사용',`[직원:${state.staffName}] ${c.label} 사용`);await load()}
async function convertCoupon(id,cid){const m=state.members.find(x=>x.id===id),c=memberCoupons(id).find(x=>x.id===cid);if(!m||!c)return;const points=Number(m.point_balance||0)+Number(c.point_value||200);await api(`coupons?id=eq.${cid}`,{method:'PATCH',body:JSON.stringify({status:'used',used_at:new Date().toISOString()})});await updatePoints(id,points);await addHistoryDb(id,'포인트전환',`[직원:${state.staffName}] ${c.label} → ${c.point_value||200}P 전환`);await load()}
async function usePoints(id){const m=state.members.find(x=>x.id===id);if(!m||Number(m.point_balance||0)<1000)return;const p=Number(m.point_balance||0)-1000;await updatePoints(id,p);await addHistoryDb(id,'포인트사용',`[직원:${state.staffName}] 1000P 사용 처리`);await load()}
async function repurchaseReset(id){const m=state.members.find(x=>x.id===id);if(!m)return;await updateStamps(id,Number(m.stamps||0)+1);await addHistoryDb(id,'재구매리셋',`[직원:${state.staffName}] 재구매 확인 · 스탬프 +1 · 오늘 룰렛 리셋`);await api(`roulette_plays?member_id=eq.${id}&play_date=eq.${today()}`,{method:'DELETE'});await load()}
async function spinCustomer(){const m=customerMember();if(!m)return;const played=playsToday(m.id);if(played>=DAILY_LIMIT||Number(m.stamps||0)<1)return;const idx=rewardBag(),slice=360/state.rewards.length,mid=idx*slice+slice/2,current=state.wheelAngle,normalized=((current%360)+360)%360,final=360-mid,delta=((final-normalized)+360)%360,target=current+360*6+delta;state.spinning=true;state.result='룰렛을 돌리는 중...';state.wheelAngle=current;render();requestAnimationFrame(()=>{const wheel=document.getElementById('customerWheel');if(wheel)wheel.style.transform=`rotate(${target}deg)`});setTimeout(async()=>{const rw=state.rewards[idx]||state.rewards[0];state.wheelAngle=target;await updateStamps(m.id,Number(m.stamps||0)-1+(rw.type==='stamp'?Number(rw.value||0):0));if(rw.type==='coupon'){await api('coupons',{method:'POST',body:JSON.stringify([{member_id:m.id,type:rw.couponType,label:rw.couponLabel||rw.name,status:'active',point_value:rw.pointValue||200}])})}await api('roulette_plays',{method:'POST',body:JSON.stringify([{member_id:m.id,play_date:today(),result:rw.name}])});await addHistoryDb(m.id,'고객룰렛',rw.type==='coupon'?`룰렛 당첨 · ${rw.couponLabel||rw.name} 지급`:`룰렛 당첨 · ${rw.name}`);state.spinning=false;state.result=`${rw.name} 당첨`;await load()},3900)}
function toggleCustomerHistory(){state.customerHistoryOpen=!state.customerHistoryOpen;render()} function toggleStaffHistory(){state.staffHistoryOpen=!state.staffHistoryOpen;render()} function editRewardName(i,v){state.rewards[i].name=v;if(state.rewards[i].type==='coupon')state.rewards[i].couponLabel=v;localStorage.setItem('bluedia_rewards',JSON.stringify(state.rewards));render()} function editRewardProb(i,v){state.rewards[i].prob=Number(v);localStorage.setItem('bluedia_rewards',JSON.stringify(state.rewards));render()} function uploadMenu(e){const file=e.target.files[0];if(!file)return;const rd=new FileReader();rd.onload=()=>{state.menuImage=rd.result;localStorage.setItem('bluedia_menu_image',rd.result);render()};rd.readAsDataURL(file)}
Object.assign(window,{lookup,goStaff,staffLogin,adminLogin,keypad,addStamp,useCoupon,convertCoupon,usePoints,repurchaseReset,spinCustomer,toggleCustomerHistory,toggleStaffHistory,editRewardName,editRewardProb,uploadMenu,signup});
load();
</script>
</body>
</html>
